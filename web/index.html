<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2b2a27" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F5F5F0" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>vibr8</title>
    <script>
      // Apply dark mode + background color before first paint to prevent white flash
      (function(){var d=localStorage.getItem("cc-dark-mode"),dark=d==="true"||(d===null&&matchMedia("(prefers-color-scheme: dark)").matches);if(dark){document.documentElement.classList.add("dark");document.documentElement.style.background="#2b2a27"}else{document.documentElement.style.background="#F5F5F0"}})();
    </script>
  </head>
  <body class="bg-cc-bg text-cc-fg">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
