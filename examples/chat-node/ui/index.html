<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>chat-node</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      display: flex; flex-direction: column;
    }
    .log {
      flex: 1; overflow-y: auto; padding: 1.5rem;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .msg {
      max-width: 42rem; padding: 0.7rem 1rem; border-radius: 14px;
      line-height: 1.45; white-space: pre-wrap;
    }
    .msg.user { align-self: flex-end; background: #4a80ff20; border: 1px solid #4a80ff40; }
    .msg.assistant { align-self: flex-start; background: #8884; border: 1px solid #8886; }
    .msg.preview {
      align-self: flex-end; background: #4a80ff10; border: 1px dashed #4a80ff40;
      font-style: italic; opacity: 0.7;
    }
    .msg.preview::after {
      content: "…"; margin-left: 0.15rem; opacity: 0.6;
      animation: blink 1.2s steps(3, end) infinite;
    }
    @keyframes blink { 50% { opacity: 0.1; } }
    .composer {
      display: flex; gap: 0.5rem; padding: 0.75rem 1rem;
      border-top: 1px solid #8884;
    }
    input {
      flex: 1; font: inherit; padding: 0.5rem 0.75rem;
      border-radius: 10px; border: 1px solid #8886;
      background: transparent; color: inherit;
    }
    button {
      font: inherit; padding: 0.5rem 1.1rem; border-radius: 10px;
      border: 1px solid #8886; background: transparent; cursor: pointer;
    }
    button:hover { background: #8882; }
    .empty { color: #888; text-align: center; padding-top: 4rem; }
  </style>
</head>
<body>
  <div class="log" id="log">
    <div class="empty" id="empty">Say something out loud (via the hub's mic) or type below.</div>
  </div>
  <form class="composer" id="composer">
    <input id="input" placeholder="Type a message…" autocomplete="off" autofocus />
    <button type="submit">Send</button>
  </form>

<script>
const path   = location.pathname.replace(/\/ui\/.*$/, "");
const apiBase = `${path}/api`;
const wsBase  = `${path}/ws`;

const log      = document.getElementById("log");
const empty    = document.getElementById("empty");
const composer = document.getElementById("composer");
const input    = document.getElementById("input");

function render(m) {
  if (empty && empty.parentNode) empty.remove();
  const el = document.createElement("div");
  el.className = "msg " + (m.role === "user" ? "user" : "assistant");
  el.textContent = m.content;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

// A single "ghost" bubble that shows the interim voice transcript
// while the user is still speaking. The hub sends broadcast_voice_preview
// on every partial and once more with empty text when the segment is
// confirmed; on the final `transcript` event the node clears it and the
// real user message takes its place.
let previewEl = null;
function renderPreview(text) {
  if (!text) {
    if (previewEl) { previewEl.remove(); previewEl = null; }
    return;
  }
  if (empty && empty.parentNode) empty.remove();
  if (!previewEl) {
    previewEl = document.createElement("div");
    previewEl.className = "msg preview";
    log.appendChild(previewEl);
  }
  previewEl.textContent = text;
  log.scrollTop = log.scrollHeight;
}

// Live push channel — the node writes to /ws/chat when: the browser
// posts /api/chat (typed), a `transcript` event arrives from the hub
// (final voice), and every time an interim voice preview lands.
const proto = location.protocol === "https:" ? "wss:" : "ws:";
const ws = new WebSocket(`${proto}//${location.host}${wsBase}/chat`);
ws.onmessage = (e) => {
  try {
    const d = JSON.parse(e.data);
    if (d.type === "message") render(d);
    else if (d.type === "preview") renderPreview(d.text || "");
  } catch {}
};

composer.onsubmit = async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  await fetch(`${apiBase}/chat`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text }),
  });
};
</script>
</body>
</html>
